services:
  - type: web
    name: service-request-management-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: supersecretkey
      - key: MONGODB_URI
        value: mongodb+srv://vipinzingade01_db_user:Vipin12345@cluster0.zodxsio.mongodb.net/service-request-db?retryWrites=true&w=majority&appName=Cluster0
      - key: CLIENT_ORIGIN
        value: https://service-request-management-system.vercel.app
      - key: AI_PROVIDER
        value: mock
      - key: AI_SERVICE_TOKEN
        value: mock_secret
