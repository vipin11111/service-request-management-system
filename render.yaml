services:
  - type: web
    name: service-request-management-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: AI_PROVIDER
        value: mock
      - key: AI_SERVICE_TOKEN
        value: mock_secret
